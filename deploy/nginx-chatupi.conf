# Example Nginx location for CHATUPI.
# Adjust the path prefix and upstream port for your deployment.
# Do not commit production hostnames or TLS private material here.

location = /CHATUPI {
    return 301 /CHATUPI/;
}

location ^~ /CHATUPI/ {
    limit_req zone=global burst=20 nodelay;
    client_max_body_size 256k;
    proxy_pass http://127.0.0.1:8104/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_send_timeout 240s;
    proxy_connect_timeout 5s;
    proxy_buffering off;
    add_header Cache-Control "no-store" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
}
